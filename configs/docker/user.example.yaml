# user-service Docker 配置模板（复制为 user.yaml 后填写）

app:
  name: user-service
  env: production
  service_mode: user
  api_prefix: /api/v1

http:
  addr: ":5002"

kitex:
  addr: ":50052"

registry:
  etcd_endpoints:
    - "etcd:2379"


mysql:
  host: mysql
  port: 3306
  user: ""
  password: ""
  database: x_my_blog
  table_prefix: x_

redis:
  addr: "redis:6379"
  db: 1

jwt:
  secret: ""
  legacy_ttl: 8h
  access_ttl: 30m
  refresh_ttl: 168h

observability:
  enable_metrics: true
  service_name: user-service
