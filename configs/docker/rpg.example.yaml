# rpg-service Docker 配置模板（复制为 rpg.yaml 后填写）

app:
  name: rpg-service
  env: production
  service_mode: rpg
  api_prefix: /api/v1

http:
  addr: ":5003"

kitex:
  addr: ":50053"

registry:
  etcd_endpoints:
    - "etcd:2379"


mysql:
  host: mysql
  port: 3306
  user: ""
  password: ""
  database: x_my_blog
  table_prefix: x_

redis:
  addr: "redis:6379"
  db: 1

jwt:
  secret: ""
  legacy_ttl: 8h
  access_ttl: 30m
  refresh_ttl: 168h

pay:
  sandbox: true
  alipay_notify_url: "http://gateway:8000/api/v1/pay/notice"

observability:
  enable_metrics: true
  service_name: rpg-service
