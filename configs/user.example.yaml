# user-service 配置模板（无密钥；复制为 user.yaml 后填写）
# 与 monolith 开发库/JWT/oauth/mail 须保持一致

app:
  name: user-service
  env: development
  service_mode: user
  api_prefix: /api/v1
  blog_home: "http://localhost:5050"

http:
  addr: ":5002"
  cors_origins: []

grpc:
  addr: ":50052"
  blog_addr: "127.0.0.1:50051"

mysql:
  host: 127.0.0.1
  port: 3306
  user: ""
  password: ""
  database: x_my_blog
  table_prefix: x_
  schema_source_database: myblog

redis:
  addr: "127.0.0.1:6379"
  db: 1

jwt:
  secret: ""
  legacy_ttl: 8h
  access_ttl: 30m
  refresh_ttl: 168h

crypto:
  rsa_private_key: ""

oauth:
  github_client_id: ""
  github_client_secret: ""
  github_callback_url: "http://127.0.0.1:8000/api/v1/user/auth/github/callback"

mail:
  host: ""
  port: 465
  user: ""
  pass: ""

wechat:
  app_id: ""
  secret: ""

storage:
  upload_path: "./public/uploads/"
  public_prefix: "/static/"

observability:
  enable_metrics: true
  enable_pprof: true
  pprof_addr: ":6062"
  service_name: user-service
