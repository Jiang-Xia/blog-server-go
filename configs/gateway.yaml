# api-gateway 配置（Plan 10）
app:
  name: api-gateway
  env: development
  service_mode: gateway
  api_prefix: /api/v1
  blog_home: "http://localhost:5050"

http:
  addr: ":8000"
  cors_origins:
    - "http://localhost:5050"
    - "http://localhost:9000"

proxy:
  user_url: "http://127.0.0.1:5002"
  blog_url: "http://127.0.0.1:5001"
  rpg_url: "http://127.0.0.1:5003"

jwt:
  secret: "xia-007"
  legacy_ttl: 8h
  access_ttl: 30m
  refresh_ttl: 168h

observability:
  enable_metrics: true
  enable_pprof: true
  pprof_addr: ":6060"
  service_name: api-gateway
