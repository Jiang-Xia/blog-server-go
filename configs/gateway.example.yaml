# api-gateway 配置模板（无密钥；复制为 gateway.yaml 后填写）
# jwt.secret 须与 user/blog/rpg 一致

app:
  name: api-gateway
  env: development
  service_mode: gateway
  api_prefix: /api/v1
  blog_home: "http://localhost:5050"

http:
  addr: ":8000"
  cors_origins:
    - "http://localhost:5050"
    - "http://localhost:8080"

proxy:
  user_url: "http://127.0.0.1:5002"
  blog_url: "http://127.0.0.1:5001"
  rpg_url: "http://127.0.0.1:5003"

grpc:
  user_addr: "127.0.0.1:50052"
  blog_addr: "127.0.0.1:50051"
  rpg_addr: "127.0.0.1:50053"

jwt:
  secret: ""
  legacy_ttl: 8h
  access_ttl: 30m
  refresh_ttl: 168h

observability:
  enable_metrics: true
  enable_pprof: true
  pprof_addr: ":6060"
  service_name: api-gateway
