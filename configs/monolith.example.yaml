# 开发配置模板（无密钥；复制为 monolith.yaml 后填写，该文件 gitignore）
# 须与 user/blog/rpg 使用相同 mysql.database、redis.addr、redis.db、jwt.secret
# Nest 对照：blog-server/.env.example → 真实值在 blog-server/.env.development（亦 gitignore）
# 初始化：pwsh scripts/setup-config.ps1

app:
  name: blog-server-go
  env: development
  api_prefix: /api/v1
  blog_home: "http://localhost:5050"
  # 百度统计 OAuth（Nest：app_tongjiRefreshToken 等；env：APP_TONGJI_*）
  tongji_refresh_token: ""
  tongji_client_id: ""
  tongji_client_secret: ""

http:
  addr: ":5000"
  cors_origins: []

mysql:
  host: 127.0.0.1
  port: 3306
  user: ""
  password: ""
  database: x_my_blog
  table_prefix: x_
  schema_source_database: myblog

redis:
  addr: "127.0.0.1:6379"
  db: 1

jwt:
  secret: ""
  legacy_ttl: 8h
  access_ttl: 30m
  refresh_ttl: 168h

crypto:
  rsa_private_key: ""

oauth:
  github_client_id: ""
  github_client_secret: ""
  github_callback_url: "http://127.0.0.1:5000/api/v1/user/auth/github/callback"

mail:
  host: ""
  port: 465
  user: ""
  pass: ""

wechat:
  app_id: ""
  secret: ""

storage:
  upload_path: "./public/uploads/"
  public_prefix: "/static/"

pay:
  alipay_app_id: ""
  alipay_private_key: ""
  alipay_public_key: ""
  alipay_gateway: "https://openapi.alipay.com/gateway.do"
  alipay_notify_url: ""
  alipay_return_url: ""
  alipay_mini_cashier_page: "packageB/pages/business/pay/all-pay/all-pay"
  sandbox: false
  use_legacy_sandbox_gateway: false
  wechat_app_id: ""
  wechat_secret: ""
