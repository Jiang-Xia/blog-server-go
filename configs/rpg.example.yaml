# rpg-service 配置模板（无密钥；复制为 rpg.yaml 后填写）
# 须与 user/blog/monolith 使用相同 mysql.database、redis.addr、redis.db、jwt.secret

app:
  name: rpg-service
  env: development
  service_mode: rpg
  api_prefix: /api/v1
  blog_home: "http://localhost:5050"

http:
  addr: ":5003"
  cors_origins: []

kitex:
  addr: ":50053"

registry:
  etcd_endpoints:
    - "127.0.0.1:2379"


mysql:
  host: 127.0.0.1
  port: 3306
  user: ""
  password: ""
  database: x_my_blog
  table_prefix: x_
  schema_source_database: x_my_blog

redis:
  addr: "127.0.0.1:6379"
  db: 1

jwt:
  secret: ""
  legacy_ttl: 8h
  access_ttl: 30m
  refresh_ttl: 168h

crypto:
  rsa_private_key: ""

storage:
  upload_path: "./public/uploads/"
  public_prefix: "/static/"

pay:
  alipay_app_id: ""
  alipay_private_key: ""
  alipay_public_key: ""
  alipay_gateway: "https://openapi.alipay.com/gateway.do"
  alipay_notify_url: "http://127.0.0.1:8000/api/v1/pay/notice"
  sandbox: true

observability:
  enable_metrics: true
  enable_pprof: true
  pprof_addr: ":6063"
  service_name: rpg-service
