# blog-service 配置模板（无密钥；复制为 blog.yaml 后填写）
# 须与 user/rpg/monolith 使用相同 mysql.database、redis.addr、redis.db、jwt.secret

app:
  name: blog-service
  env: development
  service_mode: blog
  api_prefix: /api/v1
  blog_home: "http://localhost:5050"
  # 百度统计 OAuth（env：APP_TONGJI_REFRESH_TOKEN / APP_TONGJI_CLIENT_ID / APP_TONGJI_CLIENT_SECRET）
  tongji_refresh_token: ""
  tongji_client_id: ""
  tongji_client_secret: ""

http:
  addr: ":5001"
  cors_origins: []

kitex:
  addr: ":50051"

registry:
  etcd_endpoints:
    - "127.0.0.1:2379"


mysql:
  host: 127.0.0.1
  port: 3306
  user: ""
  password: ""
  database: x_my_blog
  table_prefix: x_
  schema_source_database: x_my_blog

redis:
  addr: "127.0.0.1:6379"
  db: 1

jwt:
  secret: ""
  legacy_ttl: 8h
  access_ttl: 30m
  refresh_ttl: 168h

crypto:
  rsa_private_key: ""

storage:
  upload_path: "./public/uploads/"
  public_prefix: "/static/"

observability:
  enable_metrics: true
  enable_pprof: true
  pprof_addr: ":6061"
  service_name: blog-service

# RAG 知识库（env：RAG_LLM_API_KEY、RAG_EMBEDDING_API_KEY）
rag:
  enabled: false
  daily_quota: 20
  top_k: 6
  allow_local_fallback: true
  embedding:
    mode: local
    remote_url: ""
    api_key: ""
    model: "BAAI/bge-large-zh-v1.5"
  llm:
    base_url: "https://api.deepseek.com/v1"
    api_key: ""
    model: "deepseek-chat"
  chunk:
    size: 600
    overlap: 120
