# blog-service 配置模板（无密钥；复制为 blog.yaml 后填写）

app:
  name: blog-service
  env: development
  service_mode: blog
  api_prefix: /api/v1
  blog_home: "http://localhost:5050"

http:
  addr: ":5001"
  cors_origins: []

grpc:
  addr: ":50051"
  user_addr: "127.0.0.1:50052"
  rpg_addr: "127.0.0.1:50053"

mysql:
  host: 127.0.0.1
  port: 3306
  user: ""
  password: ""
  database: x_my_blog
  table_prefix: x_
  schema_source_database: myblog

redis:
  addr: "127.0.0.1:6379"
  db: 1

jwt:
  secret: ""
  legacy_ttl: 8h
  access_ttl: 30m
  refresh_ttl: 168h

crypto:
  rsa_private_key: ""

storage:
  upload_path: "./public/uploads/"
  public_prefix: "/static/"

observability:
  enable_metrics: true
  enable_pprof: true
  pprof_addr: ":6061"
  service_name: blog-service
