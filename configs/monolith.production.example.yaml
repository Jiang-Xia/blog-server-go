# 生产配置模板（无密钥；复制为 monolith.production.yaml 后填写）
# 字段对照见 deploy/pm2/env.production.example（PM2 部署用 env.production，格式与 blog-server 相同）
# 启动：CONFIG_PATH=configs/monolith.production.yaml

app:
  name: blog-server-go
  env: production
  api_prefix: /api/v1
  blog_home: "https://your-domain.example"
  notify_email: ""
  # 百度统计 OAuth（Nest：app_tongjiRefreshToken / app_tongjiClientId / app_tongjiClientSecret）
  tongji_refresh_token: ""
  tongji_client_id: ""
  tongji_client_secret: ""

http:
  addr: ":5000"
  cors_origins:
    - "https://your-domain.example"
    - "https://admin.your-domain.example"

mysql:
  host: 127.0.0.1
  port: 3306
  user: ""
  password: ""
  database: myblog
  table_prefix: x_
  schema_source_database: myblog

redis:
  addr: "127.0.0.1:6379"
  db: 1

jwt:
  secret: ""
  legacy_ttl: 8h
  access_ttl: 30m
  refresh_ttl: 168h

crypto:
  rsa_private_key: ""

oauth:
  github_client_id: ""
  github_client_secret: ""
  github_callback_url: "https://your-domain.example/api/v1/user/auth/github/callback"

mail:
  host: ""
  port: 465
  user: ""
  pass: ""

wechat:
  app_id: ""
  secret: ""

storage:
  upload_path: "./public/uploads/"
  public_prefix: "/static/"

pay:
  alipay_app_id: ""
  alipay_private_key: ""
  alipay_public_key: ""
  alipay_gateway: "https://openapi.alipay.com/gateway.do"
  alipay_notify_url: ""
  alipay_return_url: ""
  alipay_mini_cashier_page: "packageB/pages/business/pay/all-pay/all-pay"
  sandbox: false
  use_legacy_sandbox_gateway: false
  wechat_app_id: ""
  wechat_secret: ""
