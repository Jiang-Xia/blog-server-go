services:
  gateway:
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - CONFIG_PATH=/app/configs/gateway.yaml
      - GOMEMLIMIT=60MiB
      - GOGC=50
    depends_on:
      blog:
        condition: service_started
      user:
        condition: service_started
      rpg:
        condition: service_started
      nacos:
        condition: service_healthy
    restart: unless-stopped

  blog:
    build:
      context: ../..
      dockerfile: services/blog/Dockerfile
    ports:
      - "5001:5001"
    environment:
      - CONFIG_PATH=/app/configs/blog.yaml
      - GOMEMLIMIT=90MiB
      - GOGC=50
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
      user:
        condition: service_started
      nacos:
        condition: service_healthy
    restart: unless-stopped

  user:
    build:
      context: ../..
      dockerfile: services/user/Dockerfile
    ports:
      - "5002:5002"
      - "50052:50052"
    environment:
      - CONFIG_PATH=/app/configs/user.yaml
      - GOMEMLIMIT=70MiB
      - GOGC=50
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
      nacos:
        condition: service_healthy
    restart: unless-stopped

  rpg:
    build:
      context: ../..
      dockerfile: services/rpg/Dockerfile
    ports:
      - "5003:5003"
    environment:
      - CONFIG_PATH=/app/configs/rpg.yaml
      - GOMEMLIMIT=90MiB
      - GOGC=50
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
      user:
        condition: service_started
      nacos:
        condition: service_healthy
    restart: unless-stopped

  # 学习用注册中心：控制台 http://localhost:8848/nacos（nacos/nacos）
  nacos:
    image: nacos/nacos-server:v2.3.2
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 256m
    ports:
      - "8848:8848"
      - "9848:9848"
    # Kitex 注册依赖 HTTP API；未就绪时 Register 失败会导致 Kitex 进程退出
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8848/nacos/"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: x_my_blog
      MYSQL_USER: ${MYSQL_USER:-blogdev}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql.cnf:/etc/mysql/conf.d/custom.cnf:ro
    ports:
      - "3306:3306"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "4317:4317"
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
