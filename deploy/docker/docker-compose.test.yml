# 本地/CI 测试专用 MySQL + Redis（端口 3307/6380，避免与开发 3306/6379 冲突）
services:
  mysql-test:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: x_my_blog
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ptestpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
