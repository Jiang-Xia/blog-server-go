# 叠加到微服务 compose：用本机已编译的静态资源挂 nginx（不在 Docker 内 build 前端）
#
# 前置（Windows / WSL 本机）：
#   cd blog-home-uniapp && pnpm exec uni build --mode docker
#     → dist/build/h5
#   cd blog-admin && copy .env.docker .env.production && npx vite build --config ./config/vite.config.prod.ts
#     → dist
#
# 用法：
#   docker compose -f deploy/docker/docker-compose.yml \
#     -f deploy/docker/docker-compose.scale.yml \
#     -f deploy/docker/docker-compose.frontends.yml \
#     up -d --build --scale user=3 --scale blog=3 --scale rpg=3 --scale gateway=3
#
# 浏览器：uniapp http://localhost:8008/  admin http://localhost:9856/
# API（edge）：http://localhost:8000/

services:
  uniapp:
    image: nginx:1.27-alpine
    ports:
      - "8008:80"
    volumes:
      - ../../../blog-home-uniapp/dist/build/h5:/usr/share/nginx/html:ro
      - ./nginx-spa.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway
    restart: unless-stopped

  admin:
    image: nginx:1.27-alpine
    ports:
      - "9856:80"
    volumes:
      - ../../../blog-admin/dist:/usr/share/nginx/html:ro
      - ./nginx-spa.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway
    restart: unless-stopped
