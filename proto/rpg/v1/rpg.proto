syntax = "proto3";

package rpg.v1;

option go_package = "github.com/Jiang-Xia/blog-server-go/proto/gen/go/rpg/v1;rpgv1";

// RpgService RPG 域 gRPC 契约（Plan 01 仅占位，Plan 10 启用）。
service RpgService {
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
  rpc GetPublicProfile(GetPublicProfileRequest) returns (GetPublicProfileResponse);
  // AssertNotBanned 检查用户是否处于 RPG 禁言期（blog BanGuard 调用）。
  rpc AssertNotBanned(AssertNotBannedRequest) returns (AssertNotBannedResponse);
}

message GetProfileRequest {
  uint64 user_id = 1;
}

message GetProfileResponse {
  uint64 user_id = 1;
  int32 level = 2;
  int64 exp = 3;
}

message GetPublicProfileRequest {
  uint64 user_id = 1;
}

message GetPublicProfileResponse {
  bytes profile_json = 1;
}

message AssertNotBannedRequest {
  uint64 user_id = 1;
}

message AssertNotBannedResponse {
  bool banned = 1;
  string message = 2;
}
