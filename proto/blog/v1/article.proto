syntax = "proto3";

package blog.v1;

option go_package = "github.com/Jiang-Xia/blog-server-go/proto/kitex/blog/v1;blogv1";

import "google/protobuf/empty.proto";

// ArticleService 博客域 gRPC 契约（Plan 01 仅占位，Plan 10 启用）。
service ArticleService {
  rpc GetArticle(GetArticleRequest) returns (GetArticleResponse);
  rpc ListArticles(ListArticlesRequest) returns (ListArticlesResponse);
  rpc GetArticleDetail(GetArticleDetailRequest) returns (GetArticleDetailResponse);
  rpc GetPubStats(google.protobuf.Empty) returns (GetPubStatsResponse);
  // UpdateContentModerationStatus 敏感词审核后同步 comment/msgboard/reply 状态。
  rpc UpdateContentModerationStatus(UpdateContentModerationStatusRequest) returns (UpdateContentModerationStatusResponse);
  // ListPublicCollectArticles 公开主页用户收藏文章（已发布且作者未锁定）。
  rpc ListPublicCollectArticles(ListPublicProfileArticlesRequest) returns (ListPublicProfileArticlesResponse);
  // ListPublicLikeArticles 公开主页用户点赞文章（status=1，同上过滤）。
  rpc ListPublicLikeArticles(ListPublicProfileArticlesRequest) returns (ListPublicProfileArticlesResponse);
  // GetArticleRPGFields 读取文章 RPG 字段（rpg-service Stream 消费用）。
  rpc GetArticleRPGFields(GetArticleRPGFieldsRequest) returns (GetArticleRPGFieldsResponse);
  // UpdateArticleRPGFields 更新文章 RPG 字段（rpg-service 经 gRPC 写库，不直连 blog 表）。
  rpc UpdateArticleRPGFields(UpdateArticleRPGFieldsRequest) returns (UpdateArticleRPGFieldsResponse);
  // AddArticleTipTotal 原子累加文章打赏总额。
  rpc AddArticleTipTotal(AddArticleTipTotalRequest) returns (AddArticleTipTotalResponse);
}

message GetArticleRequest {
  uint64 id = 1;
}

message GetArticleResponse {
  uint64 id = 1;
  string title = 2;
  uint64 author_id = 3;
}

message ListArticlesRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListArticlesResponse {
  repeated GetArticleResponse items = 1;
  int32 total = 2;
}

message GetArticleDetailRequest {
  string key = 1;
}

message GetArticleDetailResponse {
  bytes detail_json = 1;
}

message GetPubStatsResponse {
  int32 article_count = 1;
  int32 category_count = 2;
  int32 tag_count = 3;
}

message UpdateContentModerationStatusRequest {
  string source_type = 1;
  string source_id = 2;
  string status = 3;
}

message UpdateContentModerationStatusResponse {
  bool updated = 1;
}

message ListPublicProfileArticlesRequest {
  uint64 uid = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message PublicProfileArticleItem {
  int32 id = 1;
  string title = 2;
  string description = 3;
  string cover = 4;
  int32 views = 5;
  int32 likes = 6;
  int32 article_level = 7;
  int32 is_masterpiece = 8;
  int32 tip_total = 9;
  string create_time = 10;
}

message ListPublicProfileArticlesResponse {
  repeated PublicProfileArticleItem items = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetArticleRPGFieldsRequest {
  int32 article_id = 1;
}

message GetArticleRPGFieldsResponse {
  int32 article_id = 1;
  int32 author_uid = 2;
  string title = 3;
  int32 article_exp = 4;
  int32 article_level = 5;
  int32 reputation_gained = 6;
  int32 is_masterpiece = 7;
  int32 tip_total = 8;
}

message UpdateArticleRPGFieldsRequest {
  int32 article_id = 1;
  int32 article_exp = 2;
  int32 article_level = 3;
  int32 reputation_gained = 4;
  int32 is_masterpiece = 5;
}

message UpdateArticleRPGFieldsResponse {
  bool updated = 1;
}

message AddArticleTipTotalRequest {
  int32 article_id = 1;
  int32 amount = 2;
}

message AddArticleTipTotalResponse {
  bool updated = 1;
}
